<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Member Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Team Member Card -->
        <div class="bg-white rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 ease-in-out p-8">
            <div class="flex flex-col md:flex-row items-center md:items-start gap-6">
                <!-- Profile Image -->
                <div class="flex-shrink-0">
                    <img 
                        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%231d4ed8;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%231e3a8a;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='100' cy='100' r='100' fill='url(%23grad)'/%3E%3Ctext x='100' y='110' font-size='60' fill='white' text-anchor='middle' font-weight='bold'%3EJD%3C/text%3E%3C/svg%3E"
                        alt="John Developer"
                        class="h-24 w-24 md:h-32 md:w-32 rounded-full hover:scale-105 transition-transform duration-300 border-4 border-blue-500 object-cover"
                    >
                </div>

                <!-- Content -->
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-xl font-bold text-gray-800 mb-1">
                        John Developer
                    </h2>
                    <p class="text-gray-600 mb-4">
                        Senior Software Engineer
                    </p>
                    <p class="text-gray-500 text-sm mb-6">
                        Passionate about creating beautiful and functional web applications with modern technologies.
                    </p>

                    <!-- Social Links -->
                    <div class="flex justify-center md:justify-start gap-4">
                        <a href="#github" class="text-gray-600 hover:text-blue-500 hover:scale-110 transition-all duration-300" title="GitHub">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">

                            </svg>
                        </a>
                        <a href="#linkedin" class="text-gray-600 hover:text-blue-500 hover:scale-110 transition-all duration-300" title="LinkedIn">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.475-2.236-1.986-2.236-1.081 0-1.722.731-2.004 1.437-.103.249-.129.597-.129.946v5.422h-3.554s.047-8.794 0-9.714h3.554v1.377c.43-.664 1.199-1.609 2.918-1.609 2.134 0 3.734 1.39 3.734 4.379v5.567zM5.337 8.855c-1.144 0-1.915-.761-1.915-1.712 0-.955.77-1.71 1.954-1.71 1.184 0 1.915.756 1.937 1.71 0 .951-.753 1.712-1.976 1.712zm1.581 11.597H3.635V9.738h3.283v10.714zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/>
                            </svg>
                        </a>
                        <a href="#portfolio" class="text-gray-600 hover:text-blue-500 hover:scale-110 transition-all duration-300" title="Portfolio">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">

                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
